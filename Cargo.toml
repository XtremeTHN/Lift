[package]
name = "lift"
version = "0.1.0"
edition = "2024"

[dependencies]
ashpd = { version = "0.13.3", default-features = false, features = ["gtk4", "usb", "async-io"] }
#ashpd = { version = "0.13.3", features = ["usb", "async-std", "gtk4"] }
async-channel = "2.5.0"
env_logger = "0.11.9"
futures-util = "0.3.32"
gtk4 = "0.11.0"
libadwaita = { version = "0.9.1", features = ["v1_6"] }
log = "0.4.29"
rusb = "0.9.4"
thiserror = "2.0.18"
tokio = { version = "1.49.0", features = ["full"] }
