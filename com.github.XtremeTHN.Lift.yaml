id: com.github.XtremeTHN.Lift
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: lift
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --device=dri
  - --socket=wayland
  - --filesystem=~/.switch
  - --usb=vnd:057e+dev:3000

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  build-args:
    - --share=network
cleanup:
  - /include
  - /lib/pkgconfig
  - /man
  - /share/dock 
  - /share/gtk-doc
  - /share/man
  - /share/pkgconfig
  - \*.la
  - \*.a
modules:
  - name: lift
    builddir: true
    buildsystem: meson
    config-opts:
      - -Dportal=true
    sources:
      - type: dir
        path: .
        skip:
          - .direnv
          - .vscode
          - target
          - .envrc
          - \*.xci
          - \*.bin
          - \*.nsp
          - flake.nix
          - flake.lock
